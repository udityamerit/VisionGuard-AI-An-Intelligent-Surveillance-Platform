<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionGuard AI | Intelligent Surveillance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <div class="p-4">
            <h4 class="text-accent mb-4"><i class="bi bi-shield-check"></i> VisionGuard AI</h4>
            <nav class="mt-4">
                <a href="{{ url_for('home') }}" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    <i class="bi bi-house-door me-2"></i> Home
                </a>
                <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
                    <i class="bi bi-speedometer2 me-2"></i> Live Dashboard
                </a>
                <a href="{{ url_for('alerts') }}" class="nav-link {% if request.path == '/alerts' %}active{% endif %}">
                    <i class="bi bi-bell-fill me-2"></i> Active Alerts
                </a>
                <a href="{{ url_for('analytics') }}" class="nav-link {% if request.path == '/analytics' %}active{% endif %}">
                    <i class="bi bi-graph-up me-2"></i> Safety Analytics
                </a>
                <a href="{{ url_for('filterlab') }}" class="nav-link {% if request.path == '/filterlab' %}active{% endif %}">
                    <i class="bi bi-magic me-2"></i> Filter Lab
                </a>
            </nav>
        </div>
        <div class="mt-auto p-4 border-top border-glass">
            <div class="stat-label">System Status</div>
            <div class="text-success"><i class="bi bi-circle-fill me-2 small"></i> LIVE STREAMING</div>
        </div>
    </div>

    <div class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">{% block page_title %}Surveillance Center{% endblock %}</h2>
            <div>
                <span class="text-muted me-3" id="current-time"></span>
                <button class="btn btn-outline-light btn-sm">Sign Out</button>
            </div>
        </header>

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
